kind = "web"
previewPath = "/"
title = "Naxçıvan Residence ERP"
version = "1.0.0"
id = "artifacts/naxchivan-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25960
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/naxchivan-erp run dev"

[services.env]
PORT = "25960"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/naxchivan-erp", "run", "build"]
publicDir = "artifacts/naxchivan-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
